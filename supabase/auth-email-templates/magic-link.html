<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in to CatStays</title>
</head>
<body style="margin:0;padding:0;background:#F8F7F5;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">Your secure CatStays sign-in link is ready.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F8F7F5;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#FFFFFF;border-radius:20px;overflow:hidden;border:1px solid #E8DFD7;">
          <tr>
            <td style="padding:28px 32px;background:#0A1128;">
              <img src="https://catstays.app/icons/icon-192.png" width="48" height="48" alt="CatStays" style="display:inline-block;width:48px;height:48px;border-radius:12px;vertical-align:middle;margin-right:12px;">
              <span style="display:inline-block;vertical-align:middle;font:700 24px Georgia,serif;color:#FFFFFF;">CatStays</span>
            </td>
          </tr>
          <tr>
            <td style="padding:36px;">
              <div style="display:inline-block;margin-bottom:16px;padding:7px 12px;border-radius:999px;background:#F1E6DC;color:#C46A3A;font:700 12px Arial,sans-serif;">Secure sign in</div>
              <h1 style="margin:0;font:700 34px/1.12 Georgia,serif;color:#0A1128;">Sign in to CatStays</h1>
              <p style="margin:18px 0 0;font:16px/1.65 Arial,sans-serif;color:#687386;">Click the button below to sign in securely. This link is for your account only.</p>
              <div style="margin-top:24px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;border-radius:999px;background:#C46A3A;color:#FFFFFF;font:700 14px Arial,sans-serif;text-decoration:none;">Sign in</a>
              </div>
              <p style="margin:24px 0 0;font:13px/1.6 Arial,sans-serif;color:#687386;">One-time code: <strong style="color:#0A1128;">{{ .Token }}</strong></p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 36px;background:#0A1128;">
              <p style="margin:0;font:12px/1.6 Arial,sans-serif;color:#B8C0D6;">This sign-in email was requested for {{ .Email }}.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
