kind = "web"
previewPath = "/"
title = "CatStays"
version = "1.0.0"
id = "artifacts/catstays"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21524
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/catstays run dev"

[services.env]
PORT = "21524"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/catstays", "run", "build"]
publicDir = "artifacts/catstays/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
